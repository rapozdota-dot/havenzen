services:
  - type: web
    name: havenzen
    runtime: docker
    plan: free
    healthCheckPath: /health.php
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GPS_TRACKING_API_KEY
        generateValue: true
      - key: THERMAL_PRINTER_NAME
        value: Xprinter XP-58IIH
